<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | APEX</title>

                        "primary": "#4edea3",
                        "on-primary": "#003824",
                        "on-secondary-fixed": "#001a42",
                        "on-primary-fixed-variant": "#005236",
                        "on-background": "#dfe2f1",
                        "on-secondary": "#002e6a",
                        "primary-fixed": "#6ffbbe",
                        "outline-variant": "#3c4a42",
                        "secondary": "#adc6ff",
                        "primary-fixed-dim": "#4edea3",
                        "inverse-surface": "#dfe2f1",
                        "on-error": "#690005",
                        "surface-container-high": "#262a35",
                        "error-container": "#93000a",
                        "inverse-primary": "#006c49",
                        "on-secondary-container": "#e6ecff",
                        "on-primary-fixed": "#002113",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface": "#0f131d",
                        "background": "#0f131d",
                        "on-surface": "#dfe2f1",
                        "primary-container": "#10b981",
                        "on-secondary-fixed-variant": "#004395",
                        "on-primary-container": "#00422b",
                        "surface-container-highest": "#313540",
                        "surface-bright": "#353944",
                        "tertiary-fixed": "#ffddb8",
                        "outline": "#86948a",
                        "secondary-fixed": "#d8e2ff",
                        "surface-dim": "#0f131d",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#523200",
                        "tertiary-container": "#e29100",
                        "on-surface-variant": "#bbcabf",
                        "secondary-container": "#0566d9",
                        "on-tertiary-fixed-variant": "#653e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "32px",
                        "xs": "8px",
                        "md": "16px",
                        "sm": "12px",
                        "gutter": "24px",
                        "container-max": "1280px",

                    },
                    "fontFamily": {

                    "fontSize": {

                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

                },
            },
        }

<style>
        body {
            background-color: #0b0f19;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(21, 29, 48, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 61, 96, 0.4);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-bg {
            background: radial-gradient(circle at 50% 50%, #151d30 0%, #0b0f19 100%);
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 1px #4edea3, 0 0 12px rgba(78, 222, 163, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen p-margin-mobile md:p-0">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
<!-- Main Login Shell -->
<main class="w-full max-w-[440px] z-10 animate-in fade-in zoom-in duration-700">
<!-- Header Branding (Suppressed Nav Shell as per instructions for Transactional pages) -->
<div class="flex flex-col items-center mb-xl">
<div class="flex items-center gap-xs mb-md">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-display-lg text-headline-lg text-primary tracking-tighter uppercase">APEX</h1>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface text-center">Sign in to Apex</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Access your high-fidelity digital vault</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-full p-lg md:p-xl space-y-lg">
<form class="space-y-md" id="loginForm" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1 uppercase" for="email">Email Address</label>
<div class="relative flex items-center input-glow transition-all rounded-xl group bg-surface-container-low border border-outline-variant/20">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md text-body-md py-sm pl-[48px] pr-md placeholder:text-on-surface-variant/40" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<p class="hidden font-body-sm text-body-sm text-error px-1" id="email-error">Please enter a valid business email address.</p>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative flex items-center input-glow transition-all rounded-xl group bg-surface-container-low border border-outline-variant/20">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md text-body-md py-sm pl-[48px] pr-md placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="pass-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-headline-md text-body-lg py-md rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-lg flex items-center justify-center gap-2 group" id="signInBtn" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="flex items-center gap-md py-xs">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label-md text-label-md text-on-surface-variant/60 uppercase">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-high hover:bg-surface-container-highest border border-outline-variant/20 py-sm rounded-xl transition-all">
<span class="material-symbols-outlined text-body-lg">shield</span>
<span class="font-label-md text-label-md text-on-surface">SSO</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface-container-high hover:bg-surface-container-highest border border-outline-variant/20 py-sm rounded-xl transition-all">
<span class="material-symbols-outlined text-body-lg">fingerprint</span>
<span class="font-label-md text-label-md text-on-surface">Passkey</span>
</button>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline transition-all" href="#">Register</a>
</p>
</div>
</main>
<!-- Footer Security Badge -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 flex items-center gap-xs opacity-40 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-body-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-md text-label-md tracking-widest text-on-surface-variant uppercase">AES-256 Multi-Layer Encryption Active</span>
</div>
<script>
        // Micro-interactions and UI logic
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('pass-toggle-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('email-error');
        const btn = document.getElementById('signInBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Simple validation simulation
            if (!emailInput.value.includes('@')) {
                emailError.classList.remove('hidden');
                emailInput.closest('.group').classList.add('border-error/50');
            } else {
                emailError.classList.add('hidden');
                emailInput.closest('.group').classList.remove('border-error/50');
                
                // Loading state simulation
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
                
                setTimeout(() => {
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success';
                    btn.classList.replace('bg-primary', 'bg-tertiary-container');
                    btn.classList.replace('text-on-primary', 'text-on-tertiary-container');
                    
                    // Trigger haptic-like scale effect on success
                    btn.style.transform = "scale(1.05)";
                    setTimeout(() => {
                        alert("Authentication successful. Redirecting to APEX Dashboard...");
                    }, 500);
                }, 1500);
            }
        });

        // Add subtle mouse parallax effect to background blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const blobs = document.querySelectorAll('.rounded-full');
            blobs[0].style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            blobs[1].style.transform = `translate(-${x * 30}px, -${y * 30}px)`;
        });
    </script>
</body></html>
